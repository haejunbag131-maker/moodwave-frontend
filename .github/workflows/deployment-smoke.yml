name: Deployment Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed frontend URL to verify
        required: true
        type: string

concurrency:
  group: deployment-smoke-${{ inputs.base_url }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Verify deployed frontend and backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SMOKE_BASE_URL: ${{ inputs.base_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deployment smoke test
        run: npm run test:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: deployment-smoke-report
          path: playwright-report/
          retention-days: 14
