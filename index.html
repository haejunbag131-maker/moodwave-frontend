<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOOD WAVE</title>
    <link rel="stylesheet" href="assets/css/setting/fonts.css" />
    <link rel="stylesheet" href="assets/css/setting/vars.css" />
    <link rel="stylesheet" href="assets/css/setting/reset.css" />
    <link rel="stylesheet" href="assets/css/setting/common.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script type="module" src="assets/js/main.js"></script>
  </head>
  <body>
    <div class="container">
      <!-- 사이드바 -->
      <aside class="sidebar">
        <div class="sidebar__header">
          <!-- 로고 -->
          <div class="sidebar__brand">
            <a href="index.html" class="sidebar__brand-link">
              <img src="assets/icon/logo.svg" alt="MOOD WAVE 로고" />
              <span>MOOD WAVE</span>
            </a>
          </div>

          <!-- 주요 메뉴 -->
          <nav
            id="primaryNav"
            class="sidebar__nav-primary"
            aria-label="주요 메뉴"
          ></nav>

          <!-- 플레이리스트 메뉴 -->
          <nav
            id="secondaryNav"
            class="sidebar__nav-secondary"
            aria-label="플레이리스트 메뉴"
          ></nav>
        </div>

        <div class="sidebar__divider" aria-hidden="true"></div>

        <!-- 플레이리스트 목록 -->
        <div id="playlistList" class="sidebar__playlist-list"></div>
      </aside>

      <!-- 헤더 -->
      <header class="header">
        <!-- 메뉴 버튼 -->
        <button class="header__nav-btn" type="button" aria-label="뒤로">
          <img src="assets/icon/Back.svg" width="40" height="40" alt="" />
        </button>
        <button class="header__nav-btn" type="button" aria-label="앞으로">
          <img src="assets/icon/Forward.svg" width="40" height="40" alt="" />
        </button>

        <!-- 검색창 -->
        <form class="header__search">
          <img
            class="header__search-icon"
            src="assets/icon/Search_S.svg"
            width="32"
            height="32"
            alt=""
          />

          <input
            class="header__search-input"
            type="search"
            placeholder="Artists, songs, or podcasts"
          />
        </form>

        <span class="header__spacer" aria-hidden="true"></span>

        <!-- 프로필 -->
        <div class="header__profile">
          <img
            id="userAvatar"
            class="header__user-avatar"
            src=""
            width="34"
            height="34"
            alt=""
          />

          <span id="userName" class="header__user-name"></span>

          <!-- 드롭다운 버튼 -->
          <button
            class="header__profile-arrow-btn"
            type="button"
            aria-label="프로필 메뉴 열기"
          >
            <span class="header__profile-arrow" aria-hidden="true"></span>
          </button>

          <div class="header__dropdown">
            <button class="header__logout-btn" type="button">Logout</button>
          </div>
        </div>
      </header>

      <!-- 메인 -->
      <main class="main">
        <h1>Main</h1>
      </main>

      <!-- 푸터 -->
      <footer class="player">
        <div class="player__track">
          <img
            id="currentCover"
            class="player__cover"
            src=""
            width="56"
            height="56"
            alt=""
          />

          <div class="player__meta">
            <span id="currentTitle" class="player__title"></span>
            <span id="currentArtist" class="player__artist"></span>
          </div>

          <button
            class="player__icon player__icon--like"
            type="button"
            aria-label="좋아요"
          >
            <img
              src="assets/icon/Heart_Fill_XS.svg"
              width="28"
              height="28"
              alt=""
            />
          </button>
        </div>

        <div class="player__controls">
          <div class="player__buttons">
            <button class="player__icon" type="button" aria-label="셔플">
              <img
                src="assets/icon/Shuffle_S.svg"
                width="32"
                height="32"
                alt=""
              />
            </button>

            <button class="player__icon" type="button" aria-label="이전">
              <img src="assets/icon/Back.svg" width="32" height="32" alt="" />
            </button>

            <button
              class="player__icon player__icon--play"
              type="button"
              aria-label="일시정지"
            >
              <img
                src="assets/icon/Pause_XS.svg"
                width="48"
                height="48"
                alt=""
              />
            </button>

            <button class="player__icon" type="button" aria-label="다음">
              <img
                src="assets/icon/Forward.svg"
                width="32"
                height="32"
                alt=""
              />
            </button>

            <button class="player__icon" type="button" aria-label="반복">
              <img
                src="assets/icon/Repeat_S.svg"
                width="32"
                height="32"
                alt=""
              />
            </button>
          </div>

          <div class="player__progress">
            <span id="currentTime" class="player__time"></span>
            <div class="player__bar">
              <span id="progressBar" class="player__bar-fill"></span>
            </div>
            <span id="durationTime" class="player__time"></span>
          </div>
        </div>

        <div class="player__extras">
          <div class="player__extras-tools">
            <button class="player__icon" type="button" aria-label="가사">
              <img
                src="assets/icon/Component 2.svg"
                width="32"
                height="32"
                alt=""
              />
            </button>

            <button class="player__icon" type="button" aria-label="대기열">
              <img
                src="assets/icon/Queue_XS.svg"
                width="32"
                height="32"
                alt=""
              />
            </button>

            <button class="player__icon" type="button" aria-label="연결 기기">
              <img
                src="assets/icon/Devices_XS.svg"
                width="32"
                height="32"
                alt=""
              />
            </button>

            <button class="player__icon" type="button" aria-label="볼륨">
              <img
                src="assets/icon/Volume_XS.svg"
                width="32"
                height="32"
                alt=""
              />
            </button>
          </div>

          <div class="player__volume">
            <span class="player__volume-fill"></span>
          </div>

          <button class="player__icon" type="button" aria-label="전체 화면">
            <img
              src="assets/icon/FullScreen_S.svg"
              width="32"
              height="32"
              alt=""
            />
          </button>
        </div>
      </footer>
    </div>
  </body>
</html>
