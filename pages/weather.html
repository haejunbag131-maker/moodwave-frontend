<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Vibes</title>
    <link rel="stylesheet" href="../assets/css/pages/weather.css" />
    <link rel="stylesheet" href="../assets/css/setting/fonts.css" />
    <link rel="stylesheet" href="../assets/css/setting/vars.css" />
    <link rel="stylesheet" href="../assets/css/setting/reset.css" />
    <link rel="stylesheet" href="../assets/css/setting/common.css" />

    <link rel="stylesheet" href="../assets/css/layout.css" />

    <link rel="stylesheet" href="../assets/css/components/sidebar.css" />
    <link rel="stylesheet" href="../assets/css/components/header.css" />
    <link rel="stylesheet" href="../assets/css/components/footer.css" />
  </head>
  <body>
    <div class="container">
      <aside id="sidebar" class="sidebar"></aside>
      <header id="header" class="header"></header>
      <main class="main weather-main">
        <!-- 현재 날씨 인포 -->
        <section class="weather-hero">
          <p class="section-label">CURRENT WEATHER</p>

          <div class="weather-content">
            <div class="weather-info-box">
              <div class="weather-content-title">
                <img src="./images/rainy.svg" alt="" class="weather-icon" id="weatherIcon" />
                <h1 class="weather-title" id="weatherTitle">Rainy</h1>
              </div>
              <p class="weather-info" id="weatherInfo">18°C · Seoul</p>
              <span class="weather-desc" id="weatherDesc">조용히 하루를 마무리하기 좋은 날씨</span>
            </div>
          </div>
        </section>

        <!-- 대표 플레이리스트 -->
        <section class="featured-playlist">
          <p class="section-label">TODAY'S PLAYLIST</p>

          <a class="featured-card" id="featuredCard">
            <div class="playlist-album" id="playlistAlbum">
              <img class="btn-today" src="./images/weather-play.svg" alt="" />
            </div>

            <div class="playlist-info">
              <span class="playlist-weather" id="playlistTag">FOR RAINY DAYS</span>

              <h2 class="playlist-title" id="playlistTitle">Overcast Vibes</h2>

              <p class="playlist-genre" id="playlistGenre">Lo-fi • Indie • Soft Jazz</p>

              <span class="playlist-desc" id="playlistDesc"> 차분하게 하루를 정리하고 싶을 때 </span>
            </div>
          </a>
        </section>

        <!-- 다른 날씨 플레이리스트 -->
        <section class="weather-list-section">
          <p class="section-label">OTHER VIBES</p>

          <div class="weather-card-grid"></div>
        </section>
      </main>
      <footer id="footer" class="player"></footer>
    </div>

    <script type="module" src="/assets/js/pages/weather.js"></script>
  </body>
</html>
